<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR FOOD PRODUCTS Invoice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="invoice-box" id="invoice">

  <div class="top-section">
    <div>
      <img src="logo.png" class="logo" alt="Logo">
    </div>

    <div class="business-details">
      <h1>HR FOOD PRODUCTS</h1>
      <p>HR FOOD PRODUCTS</p>
      <p>VENNIYOOR, Kerala</p>
      <p>Phone: +91 9895592780</p>
      <p>Email: hrfoodofficial@gmail.com</p>
    </div>
  </div>

  <div class="invoice-details">
    <div>
      <h3>Customer Details</h3>
      <input type="text" id="customerName" placeholder="Customer Name">
      <input type="text" id="customerPhone" placeholder="Customer Phone">
    </div>

    <div class="invoice-info">
      <p><strong>Invoice No:</strong> <span id="invoiceNo"></span></p>
      <p><strong>Date:</strong> <span id="invoiceDate"></span></p>
    </div>
  </div>

  <table id="invoiceTable">
    <thead>
      <tr>
        <th>Item</th>
        <th>MRP</th>
        <th>Rate</th>
        <th>Qty</th>
        <th>Total</th>
        <th>No</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>

  <button onclick="addRow()" class="add-btn">
    + Add Product
  </button>
  <button
  onclick="toggleCharges()"
  class="extra-btn"
>
  Shipping & Discount
</button>

  <div
  class="charges-section"
  id="chargesSection"
>

  <div
    class="charge-box"
    id="shippingBox"
  >
    <label>Shipping Charge</label>

    <input
      type="number"
      id="shippingCharge"
      value="0"
      onchange="calculateTotal()"
    >
  </div>

  <div
    class="charge-box"
    id="discountBox"
  >
    <label>Discount</label>

    <input
      type="number"
      id="discount"
      value="0"
      onchange="calculateTotal()"
    >
  </div>

</div>
  <div class="extra-options">

    <button
      onclick="toggleExtraOptions()"
      class="extra-btn"
    >
      Additional Options
    </button>
  
    <div id="extraOptionsBox" class="extra-box">
  
      <div class="charge-box">
        <label>Old Balance</label>
  
        <input
          type="number"
          id="oldBalance"
          value="0"
          onchange="calculateTotal()"
        >
      </div>
  
    </div>
  
  </div>
 
<div
  id="oldBalancePrint"
  class="print-balance"
>

  <p>

    <strong>Old Balance :</strong>

    ₹<span id="oldBalanceText">0</span>

  </p>

</div>
  <div class="total-section">
    <h2>Grand Total: ₹<span id="grandTotal">0</span></h2>
  </div>

  <div class="footer">
    <p>Thank You For Shopping With Us ❤️</p>
  </div>

  <button onclick="printInvoice()" class="print-btn">
    Print / Save PDF
  </button>

  <button onclick="sendWhatsApp()" class="whatsapp-btn">
    Send WhatsApp Invoice
  </button>

  <button onclick="viewRecords()" class="records-btn">
    View Invoice Records
  </button>

  <div id="recordsModal" class="records-modal">
    <div class="records-content">
      <span class="close-btn" onclick="closeRecords()">&times;</span>
      <h2>Invoice Records</h2>
      <input
  type="text"
  id="recordSearch"
  placeholder="Search customer, invoice, mobile..."
  onkeyup="searchRecords()"
  class="record-search"
/>

<div id="recordsList"></div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
